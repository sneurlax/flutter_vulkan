name: flutter_vulkan
description: Flutter plugin to bind a Texture widget to a Vulkan context. Many ShaderToy shaders can be used
version: 0.1.0
homepage: https://github.com/example/flutter_vulkan

environment:
  sdk: ^3.10.0
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  ffi: ^2.1.3
  image: ^4.0.13

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.flutter_vulkan
        pluginClass: FlutterVulkanPlugin
      linux:
        pluginClass: FlutterVulkanPlugin
      macos:
        pluginClass: FlutterVulkanPlugin
